name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build APK + AAB
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Decode Keystore
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > $RUNNER_TEMP/keystore.jks

      - name: Build Release APK + AAB
        run: gradle assembleRelease bundleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
          KEYSTORE_PATH: ${{ runner.temp }}/keystore.jks
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Prepare artifacts
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          cp app/build/outputs/apk/release/app-release.apk "ReelGuard-${VERSION}.apk"
          cp app/build/outputs/bundle/release/app-release.aab "ReelGuard-${VERSION}.aab"
          echo "APK_PATH=ReelGuard-${VERSION}.apk" >> $GITHUB_ENV
          echo "AAB_PATH=ReelGuard-${VERSION}.aab" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "ReelGuard ${{ env.VERSION }}"
          body: |
            ## Fichiers

            - **`.apk`** — installation directe sur Android (test)
            - **`.aab`** — upload sur la Google Play Console

            ## Installation APK

            1. Téléchargez `ReelGuard-${{ env.VERSION }}.apk`
            2. Sur Android : Paramètres → Sécurité → Autoriser les sources inconnues
            3. Ouvrez le fichier téléchargé

          files: |
            ${{ env.APK_PATH }}
            ${{ env.AAB_PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
