name: Build & Release AAB

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build AAB
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Decode Keystore
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > $RUNNER_TEMP/keystore.jks

      - name: Build Release AAB
        run: gradle bundleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
          KEYSTORE_PATH: ${{ runner.temp }}/keystore.jks
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename AAB
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          cp app/build/outputs/bundle/release/app-release.aab "ReelGuard-${VERSION}.aab"
          echo "AAB_PATH=ReelGuard-${VERSION}.aab" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "ReelGuard ${{ env.VERSION }}"
          body: |
            ## Play Store

            Le fichier `.aab` ci-dessous est à uploader dans la Google Play Console.

          files: ${{ env.AAB_PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
