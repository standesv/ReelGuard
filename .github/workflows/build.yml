name: Build & Release APK

on:
  push:
    tags:
      - 'v*'          # Se déclenche sur chaque tag "v1.0", "v1.1", etc.
  workflow_dispatch:  # Permet aussi de lancer manuellement depuis GitHub

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Installer Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Rendre Gradle exécutable
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Construire l'APK de release
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      # 5. Signer l'APK avec le keystore stocké dans les secrets GitHub
      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      # 6. Renommer l'APK avec le numéro de version
      - name: Rename APK
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          cp "${{ steps.sign_app.outputs.signedReleaseFile }}" \
             "ReelGuard-${VERSION}.apk"
          echo "APK_PATH=ReelGuard-${VERSION}.apk" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      # 7. Créer la Release GitHub et uploader l'APK
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "ReelGuard ${{ env.VERSION }}"
          body: |
            ## 📱 Installation

            1. Téléchargez le fichier `ReelGuard-${{ env.VERSION }}.apk` ci-dessous
            2. Sur votre téléphone Android : **Paramètres → Applications → Autoriser les sources inconnues**
               (ou activez l'installation depuis votre navigateur / gestionnaire de fichiers)
            3. Ouvrez le fichier APK téléchargé et confirmez l'installation
            4. Lancez **ReelGuard** et suivez le guide de configuration

            > 💡 **Conseil** : Utilisez [Obtainium](https://github.com/ImranR98/Obtainium) pour recevoir
            > les mises à jour automatiquement depuis ce dépôt GitHub.

            ## Nouveautés
            <!-- Détaillez vos changements ici -->

          files: ${{ env.APK_PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
